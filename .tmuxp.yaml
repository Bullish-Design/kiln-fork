session_name: Kiln-Fork
windows:
  - window_name: Kiln-Fork
    layout: main-vertical
    options:
      main-pane-width: 20%
    panes:
      - shell_command:
          - cd ~/Documents/Projects/kiln-fork
          - open-project
      - shell_command:
          - tmux resizep -y 85%
          - filelist-open "startup_files.txt" kiln-fork
        focus: true
      - clear
